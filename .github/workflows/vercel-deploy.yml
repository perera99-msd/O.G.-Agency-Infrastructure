name: Vercel CI/CD & Build Verification

on:
  push:
    branches:
      - main
      - dev-dimalsha
  pull_request:
    branches:
      - main
      - dev-dimalsha

jobs:
  build-and-verify:
    name: Verify Next.js Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./website
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Run Linting & Type Checking
        run: npm run build

  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    needs: build-and-verify
    if: github.event_name == 'pull_request'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Vercel Configuration
        id: check_token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Vercel token not found in secrets. Skipping Vercel Preview Deployment step."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.check_token.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.check_token.outputs.configured == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./website

      - name: Build Project Artifacts
        if: steps.check_token.outputs.configured == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./website

      - name: Deploy Preview Artifacts to Vercel
        if: steps.check_token.outputs.configured == 'true'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./website

  deploy-production:
    name: Deploy Production to Vercel
    runs-on: ubuntu-latest
    needs: build-and-verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev-dimalsha')
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check Vercel Configuration
        id: check_token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Vercel token not found in secrets. Skipping Vercel Production Deployment step."
            echo "configured=false" >> $GITHUB_OUTPUT
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.check_token.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        if: steps.check_token.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./website

      - name: Build Project Artifacts
        if: steps.check_token.outputs.configured == 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./website

      - name: Deploy Production Artifacts to Vercel
        if: steps.check_token.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./website
